<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trash Sorting Game</title>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.1/dist/phaser.min.js"></script>

    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>
<body>

<script>
if (typeof Phaser === "undefined") {
    console.error("Phaser failed to load!");
}

const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 0 },
            debug: false
        }
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

const game = new Phaser.Game(config);

let score = 0;
let scoreText;
let currentTrash = null;

function preload() {
    this.load.image('paper', 'paper.png');
    this.load.image('plastic', 'plastic.png');
    this.load.image('glass', 'glass.png');
}

function create() {
    this.cameras.main.setBackgroundColor('#87CEEB');

    scoreText = this.add.text(16, 16, 'Score: 0', {
        fontSize: '32px',
        color: '#000'
    });

    const bins = this.physics.add.staticGroup();
    const paperBin = bins.create(200, 500, 'paper').setScale(0.5);
    const plasticBin = bins.create(400, 500, 'plastic').setScale(0.5);
    const glassBin = bins.create(600, 500, 'glass').setScale(0.5);

    this.time.addEvent({
        delay: 2000,
        callback: spawnTrash,
        callbackScope: this,
        loop: true
    });

    this.input.on('pointermove', function (pointer) {
        if (currentTrash) {
            currentTrash.x = pointer.x;
            currentTrash.y = pointer.y;
        }
    });
}

function update() {}

function spawnTrash() {
    const randomX = Phaser.Math.Between(50, 750);
    const trashType = Phaser.Math.RND.pick(['paper', 'plastic', 'glass']);

    const trashItem = this.physics.add.image(randomX, 0, trashType).setScale(0.5);
    trashItem.setVelocityY(100);

    currentTrash = trashItem;
}

</script>

</body>
</html>
